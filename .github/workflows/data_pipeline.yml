name: World Cup ETL Data Pipeline

on:
    workflow_dispatch:            # allow manual trigger from the Actions tab
    push:
        branches:
            - main
        paths-ignore:
            - 'README.md'
            - 'Images/**'
            - 'docs/**'

jobs:
    test-etl-pipeline:
        name: Extract and Load Raw Data to Postgres
        runs-on: ubuntu-latest

        # GitHub Actions starts this Postgres service container before any step
        # runs, with a proper TCP health check. Much more reliable than manually
        # `docker run`-ing and polling.
        services:
            postgres:
                image: postgres:14
                env:
                    POSTGRES_USER: ${{ secrets.DATABASE_USER }}
                    POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                    POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
                ports:
                    - 5432:5432
                # NOTE: services.X.options does NOT have access to ${{ secrets }}
                # (it's evaluated at workflow-startup time). Use bare pg_isready —
                # it returns 0 as soon as Postgres is accepting TCP connections.
                options: >-
                    --health-cmd "pg_isready"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        env:
            DATABASE_USER: ${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
            DATABASE_HOST: localhost
            DATABASE_PORT: 5432
            PORT: 5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Apply pg_init.sql (creates wc_raw schema)
              env:
                PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
              run: |
                psql -h localhost -U $DATABASE_USER -d $DATABASE_NAME -f scripts/pg_init.sql

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                python-version: "3.10"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run ETL
              run: |
                echo '🚀 Starting ETL process...'
                python3 etl/load.py
                echo '✅ ETL pipeline completed successfully.'

    test-dbt-pipeline:
        name: Run DBT Models and Tests
        runs-on: ubuntu-latest
        needs: test-etl-pipeline

        services:
            postgres:
                image: postgres:14
                env:
                    POSTGRES_USER: ${{ secrets.DATABASE_USER }}
                    POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                    POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
                ports:
                    - 5432:5432
                # NOTE: services.X.options does NOT have access to ${{ secrets }}
                # (it's evaluated at workflow-startup time). Use bare pg_isready —
                # it returns 0 as soon as Postgres is accepting TCP connections.
                options: >-
                    --health-cmd "pg_isready"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        env:
            DATABASE_USER: ${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
            DATABASE_HOST: localhost
            DATABASE_PORT: 5432
            PORT: 5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Apply pg_init.sql (creates wc_raw schema)
              env:
                PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
              run: |
                psql -h localhost -U $DATABASE_USER -d $DATABASE_NAME -f scripts/pg_init.sql

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                python-version: "3.10"

            - name: Install dependencies (ETL + dbt)
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Re-run ETL so dbt has data to transform
              run: |
                python3 etl/load.py

            - name: Copy dbt profile
              run: |
                mkdir -p ~/.dbt
                cp dbt_project/profiles.yml ~/.dbt/profiles.yml
                echo "✅ Copied profiles.yml to ~/.dbt/"

            - name: dbt debug
              run: |
                cd dbt_project
                dbt debug

            - name: dbt run
              run: |
                cd dbt_project
                dbt run

            - name: dbt test
              run: |
                cd dbt_project
                dbt test

    build-and-push-etl-docker:
        name: Build & Push ETL Pipeline Docker Image
        runs-on: ubuntu-latest
        needs: [test-etl-pipeline]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./docker/etl/Dockerfile
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_etl_app:latest
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_etl_app:${{ github.sha }}

            - name: Image Summary
              run: |
                echo "✅ Successfully built and pushed Docker image:"
                echo "🔹 Image: ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_etl_app:latest"

    build-and-push-dbt-docker:
        name: Build & Push DBT Docker Image
        runs-on: ubuntu-latest
        needs: [test-dbt-pipeline]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./docker/dbt/Dockerfile
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_dbt_app:latest
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_dbt_app:${{ github.sha }}

            - name: Image Summary
              run: |
                echo "✅ Successfully built and pushed Docker image:"
                echo "🔹 Image: ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_dbt_app:latest"

    build-and-push-streamlit-docker:
        name: Build & Push Streamlit Docker Image
        runs-on: ubuntu-latest
        needs: [build-and-push-dbt-docker, build-and-push-etl-docker]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./docker/streamlit/Dockerfile
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_streamlit_app:latest
                    ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_streamlit_app:${{ github.sha }}

            - name: Image Summary
              run: |
                echo "✅ Successfully built and pushed Docker image:"
                echo "🔹 Image: ${{ secrets.DOCKERHUB_USERNAME }}/worldcup_streamlit_app:latest"
